services:
  # Backend API (Python FastAPI)
  - type: web
    name: toolboxpro-api
    runtime: python
    buildCommand: pip install -r requirements_minimal.txt
    startCommand: uvicorn server_minimal:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
    healthCheckPath: /api/health

  # Frontend (Next.js)
  - type: web
    name: toolboxpro
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: toolboxpro-api
          property: url
    plan: free
